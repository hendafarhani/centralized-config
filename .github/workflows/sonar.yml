name: Sonar Centralized Config

on:
  workflow_run:
    workflows: ["Build Centralized Config"]
    types: [completed]
  workflow_dispatch:

jobs:
  sonar:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Analyze with SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn verify sonar:sonar \
            -Dsonar.projectKey=hendafarhani_centralized-config \
            -Dsonar.organization=hendafarhani \
            -Dsonar.host.url=https://sonarcloud.io


spring.application.name=centralized-config

#native profile loads config files from a local classpath
#spring.cloud.config.server.native.search-locations specifies the path to config files
spring.profiles.active=native
#spring.cloud.config.server.native.search-locations=file:///home/henda/centralized-configuration
spring.cloud.config.server.native.search-locations=file:///config
#Enable /busrefresh endpoint and /health endpoint
management.endpoints.web.exposure.include=busrefresh,health,info

management.server.port=8080


spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
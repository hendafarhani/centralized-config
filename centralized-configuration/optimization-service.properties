spring.application.name=optimization-service

kafka.bootstrap-servers=kafka:9092

spring.datasource.url=jdbc:postgresql://postgres:5432/optimization_service
spring.datasource.username=microgo_user
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:sql/optimization-service-schema.sql

spring.data.redis.host=redis
spring.data.redis.port=6379

optimization-service.max-nearest-drivers=5
optimization-service.minimum-central-london-supply=3
optimization-service.max-drivers-per-target-zone=8
optimization-service.reachability-threshold-minutes=45
optimization-service.stale-driver-threshold-seconds=120
optimization-service.default-traffic-multiplier=1.0
optimization-service.concert-rain-traffic-multiplier=0.78
optimization-service.airport-rush-traffic-multiplier=0.84

optimization-service.redis.geo-key=vehicle_location
optimization-service.redis.state-key-prefix=driver:geo-state:
optimization-service.redis.zone-key-prefix=driver:zone:

optimization-service.topics.scenario-started=scenario.started
optimization-service.topics.simulated-ride-requested=simulation.ride.requested
optimization-service.topics.simulation-metrics-updated=simulation.metrics.updated
optimization-service.topics.simulation-completed=simulation.completed
optimization-service.topics.driver-location-updated=driver.location.updated
optimization-service.topics.ride-assigned=ride.assigned
optimization-service.topics.ride-cancelled=ride.cancelled
optimization-service.topics.optimization-requested=optimization.requested
optimization-service.topics.optimization-completed=optimization.completed
optimization-service.topics.driver-repositioning-recommended=driver.repositioning.recommended
optimization-service.topics.optimized-assignment-recommended=optimized.assignment.recommended

optimization-service.listeners.scenario-started-id=optimizationScenarioStartedListener
optimization-service.listeners.simulated-ride-requested-id=optimizationRideRequestedListener
optimization-service.listeners.simulation-metrics-updated-id=optimizationMetricsListener
optimization-service.listeners.simulation-completed-id=optimizationCompletedListener
optimization-service.listeners.driver-location-updated-id=optimizationDriverLocationListener
optimization-service.listeners.ride-assigned-id=optimizationRideAssignedListener
optimization-service.listeners.ride-cancelled-id=optimizationRideCancelledListener

optimization-service.consumers.scenario-started-group-id=optimization.service.scenario-started.group
optimization-service.consumers.simulated-ride-requested-group-id=optimization.service.ride-requested.group
optimization-service.consumers.simulation-metrics-updated-group-id=optimization.service.metrics.group
optimization-service.consumers.simulation-completed-group-id=optimization.service.completed.group
optimization-service.consumers.driver-location-updated-group-id=optimization.service.driver-location.group
optimization-service.consumers.ride-assigned-group-id=optimization.service.ride-assigned.group
optimization-service.consumers.ride-cancelled-group-id=optimization.service.ride-cancelled.group

server.port=${PORT:0}

eureka.client.serviceUrl.defaultZone=http://discovery:8082/eureka
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}

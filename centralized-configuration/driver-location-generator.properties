spring.application.name=driver-location-generator
kafka.bootstrap-servers=kafka:9092

kafka.topics.driver-generated=driver.generated
kafka.topics.driver-location-updated=driver.location.updated
kafka.topics.driver-entered-zone=driver.zone.entered
kafka.topics.driver-reached-pickup=driver.reached.pickup
kafka.topics.driver-reached-destination=driver.reached.destination
kafka.topics.driver-became-available=driver.available
kafka.topics.reposition-driver-command=driver.command.reposition
kafka.topics.move-to-pickup-command=driver.command.move-to-pickup
kafka.topics.start-trip-command=driver.command.start-trip
kafka.topics.stop-driver-command=driver.command.stop

kafka.consumers.driver-generated.group-id=driver.location.generator.driver-generated.group
kafka.consumers.reposition-driver-command.group-id=driver.location.generator.reposition.group
kafka.consumers.move-to-pickup-command.group-id=driver.location.generator.pickup.group
kafka.consumers.start-trip-command.group-id=driver.location.generator.trip.group
kafka.consumers.stop-driver-command.group-id=driver.location.generator.stop.group

kafka.listeners.driver-generated.id=driverGeneratedListener
kafka.listeners.reposition-driver-command.id=repositionDriverCommandListener
kafka.listeners.move-to-pickup-command.id=moveToPickupCommandListener
kafka.listeners.start-trip-command.id=startTripCommandListener
kafka.listeners.stop-driver-command.id=stopDriverCommandListener

spring.data.redis.host=redis
spring.data.redis.port=6379

spring.datasource.url=jdbc:postgresql://postgres:5432/driver_location
spring.datasource.username=microgo_user
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=update

driver-location-generator.movement-interval-ms=5000
driver-location-generator.idle-step-meters=120
driver-location-generator.reposition-step-meters=260
driver-location-generator.pickup-step-meters=340
driver-location-generator.trip-step-meters=420
driver-location-generator.arrival-threshold-meters=35
driver-location-generator.redis.geo-key=vehicle_location
driver-location-generator.redis.state-key-prefix=driver:geo-state:
driver-location-generator.redis.zone-key-prefix=driver:zone:
driver-location-generator.scenarios.CONCERT_RAIN.center-latitude=51.5560
driver-location-generator.scenarios.CONCERT_RAIN.center-longitude=-0.2796
driver-location-generator.scenarios.CONCERT_RAIN.spread-km=4.0
driver-location-generator.scenarios.CONCERT_RAIN.demand-bias-latitude=51.5560
driver-location-generator.scenarios.CONCERT_RAIN.demand-bias-longitude=-0.2796
driver-location-generator.scenarios.CONCERT_RAIN.traffic-multiplier=0.78
driver-location-generator.scenarios.AIRPORT_RUSH.center-latitude=51.4700
driver-location-generator.scenarios.AIRPORT_RUSH.center-longitude=-0.4543
driver-location-generator.scenarios.AIRPORT_RUSH.spread-km=6.0
driver-location-generator.scenarios.AIRPORT_RUSH.demand-bias-latitude=51.4700
driver-location-generator.scenarios.AIRPORT_RUSH.demand-bias-longitude=-0.4543
driver-location-generator.scenarios.AIRPORT_RUSH.traffic-multiplier=0.84

server.port=${PORT:0}

eureka.client.serviceUrl.defaultZone=http://discovery:8082/eureka
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}

spring.devtools.restart.enabled=true

spring.application.name=outbox-publisher-service

kafka.enabled=true
kafka.bootstrap-servers=kafka:9092

spring.datasource.url=jdbc:mysql://mysql:3306/ride_requests_db
spring.datasource.username=microgo_user
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update

server.port=${PORT:8086}

eureka.client.serviceUrl.defaultZone=http://discovery:8082/eureka
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}

outbox.publisher.enabled=true
outbox.publisher.event-topic=ride.request.events
outbox.publisher.ack-topic=ride.request.events.acks
outbox.publisher.ack-listener-id=outboxAckListener
outbox.publisher.ack-group-id=outbox-publisher-service.group
outbox.publisher.event-topic-partitions=3
outbox.publisher.ack-topic-partitions=3
outbox.publisher.replication-factor=1
outbox.publisher.batch-size=50
outbox.publisher.fixed-delay-ms=1000
outbox.publisher.ack-timeout-seconds=30
outbox.publisher.max-retry-count=10

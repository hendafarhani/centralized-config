spring.application.name=location-rider
kafka.bootstrap-servers=kafka:9092

spring.quartz.jdbc.initialize-schema=always
spring.quartz.job-store-type=memory

location-rider.quartz.jobs[0].job-id=rider-location-job
location-rider.quartz.jobs[0].trigger-id=rider-location-trigger
location-rider.quartz.jobs[0].interval-seconds=2
location-rider.quartz.jobs[0].repeat-count=-1
location-rider.quartz.jobs[0].job-class=com.tracker.location_rider.quartz.job.RiderLocationJob

spring.datasource.url=jdbc:mysql://mysql:3306/ride_requests_db
spring.datasource.username=microgo_user
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update

server.port=${PORT:0}

eureka.client.serviceUrl.defaultZone=http://discovery:8082/eureka
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}
eureka.client.enabled=false

spring.devtools.restart.enabled=true

spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

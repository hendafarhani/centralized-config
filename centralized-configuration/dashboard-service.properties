spring.application.name=dashboard-service

kafka.bootstrap-servers=kafka:9092

spring.datasource.url=jdbc:mysql://mysql:3306/ride_requests_db
spring.datasource.username=microgo_user
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=none

server.port=${PORT:8087}

eureka.client.serviceUrl.defaultZone=http://discovery:8082/eureka
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}

dashboard.service.event-topic=ride.request.events
dashboard.service.ack-topic=ride.request.events.acks
dashboard.service.consumer-group-id=dashboard-service.group
dashboard.service.listener-id=dashboardServiceListener
dashboard.service.event-topic-partitions=3
dashboard.service.ack-topic-partitions=3
dashboard.service.replication-factor=1
